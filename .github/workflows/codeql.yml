name: "CodeQL"

on:
  push:
    branches: [ main ]
    paths:
      - 'cli/**/*.go'
  pull_request:
    branches: [ main ]
    paths:
      - 'cli/**/*.go'
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sundays

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'go' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@9792ccaef0455e446c567163589397e8c3ac2e0d # v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@9792ccaef0455e446c567163589397e8c3ac2e0d # v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@9792ccaef0455e446c567163589397e8c3ac2e0d # v3
      continue-on-error: true
      with:
        category: "/language:${{matrix.language}}"

